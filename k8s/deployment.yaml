apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-api
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops-reliability-platform
    app.kubernetes.io/component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agentops-api
  template:
    metadata:
      labels:
        app: agentops-api
        app.kubernetes.io/name: agentops-reliability-platform
    spec:
      serviceAccountName: agentops-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: chrysisandreou/agentops-reliability-platform:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agentops-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentops-llm-credentials
                  key: OPENAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentops-llm-credentials
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: sample-data
              mountPath: /app/sample_data
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agentops-data
        - name: sample-data
          configMap:
            name: agentops-sample-data
