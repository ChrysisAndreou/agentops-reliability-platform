apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentops-api
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops-reliability-platform
spec:
  podSelector:
    matchLabels:
      app: agentops-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: agentops-api
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
