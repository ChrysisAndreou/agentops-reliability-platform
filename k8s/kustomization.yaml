apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agentops

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret-template.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/part-of: agentops-reliability-platform
  app.kubernetes.io/managed-by: kustomize

images:
  - name: chrysisandreou/agentops-reliability-platform
    newTag: latest

patchesStrategicMerge:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: agentops-api
      spec:
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 2
                    memory: 4Gi
    target:
      kind: Deployment
      name: agentops-api
