apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentops-data
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops-reliability-platform
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
